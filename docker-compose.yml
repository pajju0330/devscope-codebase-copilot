services:
  postgres:
    image: pgvector/pgvector:pg16
    container_name: devscope-postgres
    environment:
      POSTGRES_DB: devscope
      POSTGRES_USER: devscope
      POSTGRES_PASSWORD: devscope
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U devscope -d devscope"]
      interval: 5s
      timeout: 5s
      retries: 5

volumes:
  pgdata:
