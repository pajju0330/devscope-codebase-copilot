spring:
  datasource:
    url: jdbc:postgresql://localhost:5432/devscope
    username: devscope
    password: devscope
    driver-class-name: org.postgresql.Driver
  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
        format_sql: true
  flyway:
    enabled: true
    locations: classpath:db/migration
  servlet:
    multipart:
      max-file-size: 200MB
      max-request-size: 200MB
  task:
    execution:
      pool:
        core-size: 4
        max-size: 8
        queue-capacity: 50
devscope:
  llm:
    model: ${DEVSCOPE_LLM_MODEL:models/gemini-2.5-flash-lite}
    base-url: ${DEVSCOPE_LLM_BASE_URL:https://generativelanguage.googleapis.com}
    api-key: ${DEVSCOPE_LLM_API_KEY:${GEMINI_API_KEY:}}
    temperature: 0.0
    max-output-tokens: 1000
  embedding:
    model: ${DEVSCOPE_EMBEDDING_MODEL:models/gemini-embedding-2-preview}
    batch-size: 100
    max-retries: 3
    initial-backoff-ms: 10000
    max-backoff-ms: 80000
  ingestion:
    supported-extensions: [.java, .py, .go, .ts, .js, .kt]
    max-file-size-kb: 500
    temp-dir: /tmp/devscope
