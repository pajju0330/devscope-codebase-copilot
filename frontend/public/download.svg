<svg width="220" height="220" viewBox="0 0 220 220" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="grad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#6C63FF;stop-opacity:1"></stop>
      <stop offset="100%" style="stop-color:#00C9A7;stop-opacity:1"></stop>
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect x="10" y="10" width="200" height="200" rx="30" fill="#0F172A"></rect>

  <!-- Git branch lines -->
  <circle cx="70" cy="70" r="6" fill="url(#grad)"></circle>
  <circle cx="70" cy="120" r="6" fill="url(#grad)"></circle>
  <circle cx="120" cy="120" r="6" fill="url(#grad)"></circle>

  <path d="M70 76 L70 114" stroke="url(#grad)" stroke-width="3"></path>
  <path d="M70 120 L114 120" stroke="url(#grad)" stroke-width="3"></path>

  <!-- Central node -->
  <circle cx="120" cy="120" r="8" fill="#00C9A7"></circle>

  <!-- Flow into AI/query -->
  <path d="M120 128 C120 150, 150 150, 150 120" stroke="url(#grad)" stroke-width="3" fill="none"></path>

  <!-- Chat bubble -->
  <rect x="140" y="90" width="50" height="35" rx="10" fill="url(#grad)"></rect>
  <polygon points="150,125 155,140 165,125" fill="url(#grad)"></polygon>

  <!-- Query dots -->
  <circle cx="155" cy="107" r="2.5" fill="#0F172A"></circle>
  <circle cx="165" cy="107" r="2.5" fill="#0F172A"></circle>
  <circle cx="175" cy="107" r="2.5" fill="#0F172A"></circle>
</svg>